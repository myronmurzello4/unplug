<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Oasis</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const COLORS = {
  forest: "#1a3a2a",
  leaf: "#2d6a4f",
  moss: "#40916c",
  mint: "#74c69d",
  dew: "#b7e4c7",
  sky: "#e8f5e9",
  gold: "#f4b942",
  amber: "#e67e22",
  cream: "#fdf8f0",
  charcoal: "#1c1c1e",
  mist: "#f0f7f4",
};

const style = `
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background:
      radial-gradient(circle at top right, rgba(116,198,157,0.22), transparent 28%),
      linear-gradient(180deg, #f5fbf7 0%, #eef6f1 100%);
    color: #1c1c1e;
  }

  :root {
    --forest: #1a3a2a;
    --leaf: #2d6a4f;
    --moss: #40916c;
    --mint: #74c69d;
    --dew: #b7e4c7;
    --gold: #f4b942;
    --amber: #e67e22;
    --cream: #fdf8f0;
    --mist: #f0f7f4;
  }

  .app-shell {
    min-height: 100vh;
    background: transparent;
    position: relative;
    overflow-x: hidden;
  }
  .app-shell::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 10% 20%, rgba(244,185,66,0.10), transparent 20%),
      radial-gradient(circle at 90% 5%, rgba(116,198,157,0.16), transparent 22%);
    z-index: 0;
  }
  .pb-nav, .nav, .bottom-nav, .toast, .modal-overlay { position: relative; z-index: 1; }
  .ms-icon {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    font-size: 1em;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    direction: ltr;
    font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
  }
  .icon-badge {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(116,198,157,0.18), rgba(244,185,66,0.18));
    color: var(--forest);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22);
    flex-shrink: 0;
  }
  .icon-badge .ms-icon { font-size: 20px; }

  /* NAV */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14, 38, 27, 0.88);
    backdrop-filter: blur(18px);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(116,198,157,0.14);
    box-shadow: 0 10px 30px rgba(13, 33, 24, 0.18);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--mint);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo span { color: var(--gold); }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(183,228,199,0.7);
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--mint); background: rgba(116,198,157,0.1); }
  .nav-tab.active { background: var(--mint); color: var(--forest); font-weight: 600; }
  .nav-credits {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #f4b942, #e67e22);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(230, 126, 34, 0.28);
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--forest) 0%, #0d2b1d 60%, #162e22 100%);
    padding: 60px 24px 80px;
    position: relative;
    overflow: hidden;
    display: grid;
    gap: 28px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(116,198,157,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -100px; left: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(244,185,66,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(116,198,157,0.15);
    border: 1px solid rgba(116,198,157,0.3);
    color: var(--mint);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900;
    color: white;
    line-height: 1.05;
    margin-bottom: 16px;
  }
  .hero h1 em { color: var(--mint); font-style: normal; }
  .hero p {
    color: rgba(183,228,199,0.75);
    font-size: 15px;
    line-height: 1.7;
    max-width: 360px;
    margin-bottom: 32px;
  }
  .hero-grid {
    display: grid;
    gap: 28px;
    align-items: end;
  }
  .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, var(--moss), var(--leaf));
    color: white;
    border: none;
    padding: 13px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(45,106,79,0.4);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(45,106,79,0.5); }
  .btn-ghost {
    background: transparent;
    color: var(--mint);
    border: 1.5px solid rgba(116,198,157,0.4);
    padding: 13px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-ghost:hover { border-color: var(--mint); background: rgba(116,198,157,0.08); }

  /* HERO STATS */
  .hero-stats {
    display: flex;
    gap: 24px;
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid rgba(116,198,157,0.12);
    flex-wrap: wrap;
  }
  .stat-item { }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: rgba(183,228,199,0.6);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 4px;
  }
  .hero-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 22px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.16);
    backdrop-filter: blur(14px);
    max-width: 420px;
    justify-self: end;
  }
  .hero-panel-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .hero-panel-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.72);
  }
  .hero-panel-balance {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    line-height: 1;
    color: white;
    margin-bottom: 8px;
  }
  .hero-panel-copy {
    color: rgba(183,228,199,0.72);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .hero-panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .hero-metric {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px;
  }
  .hero-metric-label {
    color: rgba(255,255,255,0.58);
    font-size: 11px;
    margin-bottom: 8px;
  }
  .hero-metric-value {
    color: white;
    font-weight: 700;
    font-size: 16px;
  }

  /* SECTION */
  .section { padding: 40px 24px; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--forest);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .ms-icon { font-size: 1em; }
  .section-sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }

  /* PROFILE CARD */
  .profile-card {
    background: rgba(255,255,255,0.92);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(26,58,42,0.10);
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.7);
  }
  .profile-header {
    background: linear-gradient(135deg, var(--forest), var(--leaf));
    padding: 28px 24px 50px;
    position: relative;
  }
  .profile-avatar-ring {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--amber));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(244,185,66,0.4);
  }
  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
  }
  .profile-handle { font-size: 13px; color: rgba(183,228,199,0.7); margin-top: 4px; }
  .profile-badge {
    position: absolute;
    top: 24px; right: 24px;
    background: rgba(244,185,66,0.15);
    border: 1px solid rgba(244,185,66,0.4);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .profile-body { padding: 24px; margin-top: -20px; }
  .credit-bar-wrap {
    background: var(--mist);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .credit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .credit-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--forest);
  }
  .credit-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .progress-bg {
    background: var(--dew);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--moss), var(--mint));
    transition: width 1s ease;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #888;
    margin-top: 6px;
  }
  .profile-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .p-stat {
    background: var(--mist);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .p-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--leaf);
  }
  .p-stat-l { font-size: 10px; color: #888; margin-top: 3px; }

  /* EARN CARDS */
  .earn-grid { display: flex; flex-direction: column; gap: 14px; }
  .earn-card {
    background: rgba(255,255,255,0.94);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 16px 30px rgba(26,58,42,0.08);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .earn-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    border-radius: 0 4px 4px 0;
  }
  .earn-card.green::before { background: var(--moss); }
  .earn-card.gold::before { background: var(--gold); }
  .earn-card.blue::before { background: #4a90d9; }
  .earn-card:hover { transform: translateY(-4px); border-color: var(--dew); }
  .earn-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .earn-icon.green { background: rgba(64,145,108,0.1); }
  .earn-icon.gold { background: rgba(244,185,66,0.1); }
  .earn-icon.blue { background: rgba(74,144,217,0.1); }
  .earn-icon .ms-icon { font-size: 24px; }
  .earn-info { flex: 1; }
  .earn-title { font-size: 15px; font-weight: 600; color: var(--forest); margin-bottom: 4px; }
  .earn-desc { font-size: 12px; color: #888; line-height: 1.5; margin-bottom: 10px; }
  .earn-pts {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(64,145,108,0.1);
    color: var(--leaf);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* CYCLE BOOKING */
  .cycle-map-placeholder {
    background: linear-gradient(135deg, #e8f5e9, #d4edda);
    border-radius: 16px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(116,198,157,0.3);
  }
  .map-overlay {
    text-align: center;
  }
  .map-emoji { font-size: 48px; }
  .map-text { font-size: 13px; color: var(--leaf); margin-top: 8px; font-weight: 500; }
  .cycle-stands { display: flex; flex-direction: column; gap: 10px; }
  .stand-row {
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 10px rgba(26,58,42,0.05);
  }
  .stand-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 3px rgba(116,198,157,0.2);
  }
  .stand-dot.busy { background: var(--gold); box-shadow: 0 0 0 3px rgba(244,185,66,0.2); }
  .stand-info { flex: 1; }
  .stand-name { font-size: 14px; font-weight: 600; color: var(--forest); }
  .stand-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .stand-book {
    background: var(--leaf);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stand-book:hover { background: var(--forest); }
  .stand-book.full { background: #ddd; color: #888; cursor: not-allowed; }

  /* CO2 TRACKER */
  .co2-card {
    background: linear-gradient(135deg, var(--forest), #0d2b1d);
    border-radius: 20px;
    padding: 24px;
    color: white;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .co2-card::after {
    content: '🌿';
    position: absolute;
    right: 16px; top: 16px;
    font-size: 48px;
    opacity: 0.15;
  }
  .co2-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--mint);
  }
  .distance-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .dist-input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(116,198,157,0.3);
    color: white;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .dist-input::placeholder { color: rgba(255,255,255,0.4); }
  .dist-input:focus { border-color: var(--mint); }
  .calc-btn {
    background: var(--mint);
    color: var(--forest);
    border: none;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .calc-btn:hover { background: var(--dew); }
  .vehicle-options { display: flex; flex-direction: column; gap: 8px; }
  .vehicle-row {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
  }
  .vehicle-row.best {
    border-color: var(--mint);
    background: rgba(116,198,157,0.12);
  }
  .vehicle-row.best .best-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--mint);
    color: var(--forest);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
  }
  .v-icon { font-size: 22px; }
  .v-icon .ms-icon { font-size: 24px; }
  .v-info { flex: 1; }
  .v-name { font-size: 13px; font-weight: 600; }
  .v-co2 { font-size: 11px; color: rgba(183,228,199,0.6); margin-top: 2px; }
  .v-saved {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
  }
  .best-tag { display: none; }

  /* REWARDS */
  .rewards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .reward-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 14px rgba(26,58,42,0.07);
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
  }
  .reward-card:hover { transform: translateY(-3px); border-color: var(--dew); }
  .reward-img {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .reward-body { padding: 12px; }
  .reward-name { font-size: 13px; font-weight: 600; color: var(--forest); margin-bottom: 4px; line-height: 1.3; }
  .reward-pts {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--amber);
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .reward-claim {
    width: 100%;
    background: var(--mist);
    border: 1px solid var(--dew);
    color: var(--leaf);
    padding: 7px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reward-claim:hover { background: var(--leaf); color: white; }
  .reward-claim.locked { color: #aaa; cursor: not-allowed; border-color: #ddd; }
  .reward-lock { font-size: 10px; color: #aaa; margin-top: 4px; text-align: center; }

  /* TREE TRACKER */
  .tree-upload-card {
    background: white;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 2px 16px rgba(26,58,42,0.07);
    margin-bottom: 14px;
  }
  .tree-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .tree-avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--dew), var(--mint));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

function AuthScreen({ onLogin }) {
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
    try {
      const res = await fetch(`http://localhost:5000${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(isLogin ? { email, password } : { name, email, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        onLogin(data.token, data.user);
      } else {
        alert(data.msg || 'Error occurred');
      }
    } catch(err) {
      alert('Server error. Is the backend running?');
    }
  };

  return (
    <>
      <style>{style}</style>
      <div className="app-shell auth-screen">
        <div className="auth-card">
          <h2 style={{fontFamily:"'Playfair Display', serif", color:"var(--forest)", marginBottom: 8}}>
            {isLogin ? "Welcome Back to Urban Oasis" : "Join Urban Oasis"}
          </h2>
          <p style={{color: "#888", marginBottom: 24, fontSize: 13}}>
            {isLogin ? "Log in to view your Green Wallet and rewards." : "Sign up to start earning Green Credits."}
          </p>
          <form onSubmit={handleSubmit}>
            {!isLogin && <input className="auth-input" placeholder="Full Name" required value={name} onChange={e=>setName(e.target.value)} />}
            <input className="auth-input" type="email" placeholder="Email Address" required value={email} onChange={e=>setEmail(e.target.value)} />
            <input className="auth-input" type="password" placeholder="Password" required value={password} onChange={e=>setPassword(e.target.value)} />
            <button type="submit" className="auth-btn">{isLogin ? "Log In" : "Sign Up"}</button>
          </form>
          <div style={{marginTop: 16, textAlign: "center", fontSize: 13, color: "var(--leaf)", cursor: "pointer"}} onClick={() => setIsLogin(!isLogin)}>
            {isLogin ? "Don't have an account? Sign up" : "Already have an account? Log in"}
          </div>
        </div>
      </div>
    </>
  );
}

  const [standsList, setStandsList] = useState([]);
  const [feedList, setFeedList] = useState([]); // Dynamic feed

  // Refresh functions to update global state after an action
  const fetchUser = () => {
    fetch('http://localhost:5000/api/auth/me', { headers: { 'x-auth-token': token } })
      .then(r => r.json())
      .then(data => {
          if(data.msg) { setToken(null); localStorage.removeItem('token'); }

      }).catch(err => { console.log(err); });

  const fetchFeed = () => {
    fetch('http://localhost:5000/api/feed')
      .then(r => r.json())
      .then(setFeedList).catch(()=>{});
  };

  const fetchStands = () => {
    fetch('http://localhost:5000/api/cycles/stands')
      .then(r => r.json())
      .then(setStandsList).catch(()=>{});
  };

  useEffect(() => {
    if (token) {
      fetchUser();
      
      fetch('http://localhost:5000/api/rewards').then(r=>r.json()).then(setRewardsList).catch(() => setRewardsList(REWARDS));
      fetch('http://localhost:5000/api/events').then(r=>r.json()).then(setEventsList).catch(()=>{});
      fetchStands();

  }, [token]);

    if (!d || d <= 0) return;
    const bestVehicle = VEHICLES.reduce((best, v) => {
      if (d >= v.range[0] && d <= v.range[1] && v.factor < best.factor) return v;
      return best;
    }, VEHICLES.find((v) => d >= v.range[0] && d <= v.range[1]) || VEHICLES[5]);

                      <div className="hero-metric">
                        <div className="hero-metric-label">Fastest earn</div>
                        <div className="hero-metric-value">Cycle ride</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="section">
                <div className="section-title">Your Profile</div>
                <div className="section-sub">Level up your green journey</div>
                <div className="profile-card">
                  <div className="profile-header">
                    <div className="profile-avatar-ring">{user.name ? user.name.charAt(0).toUpperCase() : 'U'}</div>
                    <div className="profile-name">{user.name}</div>
                    <div className="profile-handle">@{user.name ? user.name.split(' ')[0].toLowerCase() : 'user'}.green · Member since 2025</div>
                    <div className="profile-badge">🌿 Eco Warrior</div>
                  </div>
                  <div className="profile-body">
                    <div className="credit-bar-wrap">
                      <div className="credit-row">
                        <div>
                          <div className="credit-label">Green Credits</div>
                          <div className="credit-num">{credits}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div className="credit-label">Next Reward</div>
                          <div style={{ fontSize: 22, fontWeight: 700, color: "#40916c" }}>100 pts</div>
                        </div>
                      </div>
                      <div className="progress-bg">
                        <div className="progress-fill" style={{ width: `${Math.min((credits / 100) * 100, 100)}%` }} />
                      </div>
                      <div className="progress-meta">
                        <span>{credits} pts earned</span>
                        <span>{100 - credits > 0 ? `${100 - credits} to go` : "🎉 Redeem now!"}</span>
                      </div>
                    </div>
                    <div className="profile-stats">
                      <div className="p-stat"><div className="p-stat-num">{user.ridesCount || 0}</div><div className="p-stat-l">Rides</div></div>
                      <div className="p-stat"><div className="p-stat-num">{user.treesCount || 0}</div><div className="p-stat-l">Trees</div></div>
                      <div className="p-stat"><div className="p-stat-num">{user.eventsCount || 0}</div><div className="p-stat-l">Events</div></div>
                    </div>
                  </div>
                </div>

                <div className="section-title">Public Activity Feed</div>
                <div className="section-sub" style={{ marginBottom: 16 }}>See community footprint</div>
                <div className="feed">
                  {feedList.length > 0 ? feedList.map((f, i) => {
                    const timeAgo = new Date(f.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' });
                    return (
                      <div className="feed-item" key={i}>
                        <div className="feed-icon"><Icon name={f.icon || "stars"} /></div>
                        <div className="feed-text">
                          <div className="feed-title">{f.userName} {f.description.toLowerCase()}</div>
                          <div className="feed-time">{timeAgo}</div>
                        </div>
                        <div className="feed-pts" style={{ color: f.pointsEarned?.includes('-') ? '#e67e22' : 'var(--leaf)' }}>{f.pointsEarned}</div>
                      </div>
                    );
                  }) : <div style={{textAlign: "center", color: "#888", fontSize: 13}}>No recent activity found. Connect backend!</div>}
                </div>
              </div>
            </>
          )}

          {/* CYCLES TAB */}
          {activeTab === "cycles" && (
            <div className="section">
              <div className="section-title"><Icon name="pedal_bike" /> Cycle Booking</div>
              <div className="section-sub">Find stands near you and book a ride</div>

              <div className="cycle-map-placeholder">
                <div className="map-overlay">
                  <div className="map-emoji">🗺️</div>
                  <div className="map-text">Live map — 6 stands near you</div>
                </div>
              </div>

              <div style={{ marginBottom: 16 }}>
                <div className="section-title" style={{ fontSize: 18 }}>Nearby Stands</div>
              </div>
              <div className="cycle-stands">
                {(standsList.length > 0 ? standsList : [
                  { name: "MG Road Station", distanceText: "0.3 km", bikesAvailable: 4, totalBikes: 6 },
                  { name: "Indiranagar Hub", distanceText: "0.8 km", bikesAvailable: 0, totalBikes: 8 },
                  { name: "Koramangala Loop", distanceText: "1.2 km", bikesAvailable: 2, totalBikes: 5 },
                ]).map((s, i) => (
                  <div className="stand-row" key={i}>
                    <div className={`stand-dot ${ (s.bikesAvailable!==undefined?s.bikesAvailable:s.bikes) === 0 ? "busy" : "" }`} />
                    <div className="stand-info">
                      <div className="stand-name">{s.name}</div>
                      <div className="stand-meta">{s.distanceText || s.dist} · {s.bikesAvailable!==undefined?s.bikesAvailable:s.bikes}/{s.totalBikes} bikes available</div>
                    </div>
                    <button
                      className={`stand-book ${ (s.bikesAvailable!==undefined?s.bikesAvailable:s.bikes) === 0 ? "full" : "" }`}
                      onClick={() => bookCycle(s)}
                    >
                      { (s.bikesAvailable!==undefined?s.bikesAvailable:s.bikes) === 0 ? "Full" : "Book"}
                    </button>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 24, background: "white", borderRadius: 18, padding: 20, boxShadow: "0 2px 16px rgba(26,58,42,0.07)" }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: "var(--forest)", marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}><Icon name="lock" /> Lock & Earn</div>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>
                  After reaching your destination, lock your cycle at the nearest stand. Scan the QR code on the stand screen to instantly claim your Green Credit.
                </div>
                <button className="btn-primary" style={{ width: "100%" }} onClick={() => setShowQR(true)}>
                  <Icon name="qr_code_scanner" /> Scan Stand QR Code
                </button>
              </div>
            </div>
          )}

          {/* EARN TAB */}
          {activeTab === "earn" && (
            <div className="section">
              <div className="section-title">Ways to Earn</div>
              <div className="section-sub">Every green action rewards you</div>
              <div className="earn-grid">
                {[
                  { color: "green", icon: "forest", title: "Plant a Tree", desc: "Plant a tree near your area and upload progress every 5 days to earn recurring credits.", pts: "+2 pts / 5 days", action: () => showToastMsg("Scroll down to Tree Progress Upload below.") },
                  { color: "gold", icon: "pedal_bike", title: "Ride a Cycle", desc: "Book an Urban Oasis cycle from any stand and lock it at your destination.", pts: "+1 pt per ride", action: () => setActiveTab("cycles") },
                  { color: "blue", icon: "mop", title: "Clean-up Drives", desc: "Join community clean-up drives and tree plantation events organized near you.", pts: "+5 pts per event", action: () => showToastMsg("Scroll down to Upcoming Events below.") },
                  { color: "green", icon: "person", title: "Create Profile", desc: "Sign up and complete your Urban Oasis profile to kick off your green journey.", pts: "+1 pt on signup", action: () => showToastMsg("Already earned.") },
                ].map((e, i) => (
                  <div className={`earn-card ${e.color}`} key={i} onClick={e.action}>
                    <div className={`earn-icon ${e.color}`}><Icon name={e.icon} /></div>
                    <div className="earn-info">
                      <div className="earn-title">{e.title}</div>
                      <div className="earn-desc">{e.desc}</div>
                      <span className="earn-pts"><Icon name="stars" /> {e.pts}</span>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 28 }}>
                <div className="section-title" style={{ fontSize: 20 }}><Icon name="photo_camera" /> Tree Progress Upload</div>
                <div className="section-sub">Share your tree's growth every 5 days</div>
                <div className="tree-upload-card">
                  <div className="tree-header">
                    <div className="tree-avatar">🌱</div>
                    <div className="tree-info">
                      <h3>Mango Sapling #2</h3>
                      <p>Planted Jan 10 · 45 days old</p>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 10 }}>Progress uploads (every 5 days)</div>
                  <div className="tree-progress-row">
                    {["D5", "D10", "D15", "D20", "D25", "D30", "D35", "D40", "D45"].map((d, i) => (
                      <div key={i} className={`day-dot ${i < 7 ? "done" : i === 7 ? "active" : ""}`}>{i < 7 ? "✓" : i === 7 ? d : d}</div>
                    ))}
                  </div>
                  <div className="upload-zone" onClick={() => showToastMsg("📸 Upload feature — attach your photo!")}>
                    <div className="upload-icon"><Icon name="upload" /></div>
                    <div>Tap to upload today's progress photo</div>
                    <div style={{ fontSize: 11, marginTop: 4 }}>+2 Green Credits on approval</div>
                  </div>
                  <button className="upload-btn" onClick={() => uploadTreeProgress()}>
                    Submit Progress → Earn +2 Credits
                  </button>
                </div>
              </div>

              <div style={{ marginTop: 8 }}>
                <div className="section-title" style={{ fontSize: 20 }}><Icon name="event" /> Upcoming Events</div>
                <div className="section-sub">Join drives near you</div>
                {(eventsList.length > 0 ? eventsList : []).map((ev, i) => (
                  <div className="event-card" key={i}>
                    <div className={`event-banner ${ev.type}`}>
                      <div className="event-emo">{ev.emo}</div>
                      <div>
                        <div className="event-hd">{ev.title}</div>
                        <div className="event-org">{ev.org}</div>
                      </div>
                    </div>
                    <div className="event-body">
                      <div className="event-meta-row">
                        <div className="event-chip">📅 {ev.date}</div>
                        <div className="event-chip">🕐 {ev.time}</div>
                        <div className="event-chip">📍 {ev.loc}</div>
                      </div>
                      <button className="event-join" onClick={() => joinEvent(ev)}>
                        Join & Earn 🟡 +{ev.pts} Credits
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* REWARDS TAB */}
          {activeTab === "rewards" && (
            <div className="section">
              <div className="section-title"><Icon name="redeem" /> Rewards Store</div>
              <div className="section-sub">Trade your Green Credits for real perks</div>

              <div style={{ background: "linear-gradient(135deg, #1a3a2a, #2d6a4f)", borderRadius: 18, padding: "18px 20px", marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 11, color: "rgba(183,228,199,0.6)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Your Balance</div>
                  <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 34, fontWeight: 900, color: "#f4b942" }}>{credits}</div>
                  <div style={{ fontSize: 12, color: "rgba(183,228,199,0.6)", marginTop: 2 }}>Green Credits</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: "rgba(183,228,199,0.6)", marginBottom: 6 }}>Redeem threshold</div>
                  <div style={{ background: "rgba(116,198,157,0.15)", border: "1px solid rgba(116,198,157,0.3)", color: "#74c69d", fontSize: 13, fontWeight: 700, padding: "6px 14px", borderRadius: 20 }}>100 pts min</div>
                </div>
              </div>

              <div className="chip-row">
                {rewardCategories.map((c) => (
                  <div key={c} className={`filter-chip ${rewardFilter === c ? "active" : ""}`} onClick={() => setRewardFilter(c)}>{c}</div>
                ))}
              </div>

              <div className="rewards-grid">
                { (rewardsList.length > 0 ? rewardsList : REWARDS).filter((r) => rewardFilter === "All" || (r.category||r.cat) === rewardFilter).map((r, i) => {
                  const rewardCost = r.pointsCost || r.pts;
                  const rewardBackground = r.bg || r.bgCode;
                  const canClaim = credits >= rewardCost && !claimedRewards.includes(r.name);
                  const claimed = claimedRewards.includes(r.name);
                  return (
                    <div className="reward-card" key={i}>
                      <div className="reward-img" style={{ background: rewardBackground }}>{r.emoji}</div>
                      <div className="reward-body">
                        <div className="reward-name">{r.name}</div>
                        <div className="reward-pts">🟡 {rewardCost} pts</div>
                        <button
                          className={`reward-claim ${!canClaim && !claimed ? "locked" : ""}`}
                          onClick={() => !claimed && claimReward(r)}
                        >
                          {claimed ? "✅ Claimed" : canClaim ? "Claim Now" : `Need ${rewardCost} pts`}
                        </button>
                        {!canClaim && !claimed && <div className="reward-lock">{rewardCost - credits} more to go</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* CO2 TAB */}
          {activeTab === "co2" && (
            <div className="section">
              <div className="section-title"><Icon name="public" /> CO₂ Tracker</div>
              <div className="section-sub">Choose the greener way to travel</div>

              <div className="co2-card">
                <div className="co2-title">How far are you going?</div>
                <div className="distance-input-row">
                  <input
                    className="dist-input"
                    type="number"
                    placeholder="Enter distance in km"
                    value={distance}
                    onChange={(e) => setDistance(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && calcCO2()}
                  />
                  <button className="calc-btn" onClick={calcCO2}>Calculate</button>
                </div>

                {vehicleResults ? (
                  <div className="vehicle-options">
                    {vehicleResults.vehicles.map((v, i) => {
                      const isBest = v.name === vehicleResults.best;
                      const carCO2 = 192 * vehicleResults.distance;
                      const thisCO2 = v.factor * vehicleResults.distance;
                      const saved = carCO2 - thisCO2;
                      return (
                        <div className={`vehicle-row ${isBest ? "best" : ""}`} key={i} onClick={() => isBest && showToastMsg(`🌿 Best choice! Save ${saved}g CO₂ vs driving.`)}>
                          <div className="v-icon"><Icon name={v.icon} /></div>
                          <div className="v-info">
                            <div className="v-name">{v.name}</div>
                            <div className="v-co2">{v.factor === 0 ? "Zero emissions 🌿" : `${(v.factor * vehicleResults.distance).toFixed(0)}g CO₂ total`}</div>
                          </div>
                          {isBest && <div className="best-tag" style={{ display: "flex" }}>✅ Best</div>}
                          {v.factor < 192 && v.factor !== 0 && <div className="v-saved">-{saved.toFixed(0)}g</div>}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{ textAlign: "center", color: "rgba(183,228,199,0.5)", fontSize: 13, padding: "20px 0" }}>
                    Enter distance to see eco-friendly options
                  </div>
                )}
              </div>

              <div style={{ background: "white", borderRadius: 18, padding: 20, boxShadow: "0 2px 16px rgba(26,58,42,0.07)", marginBottom: 14 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: "var(--forest)", marginBottom: 14 }}>Your CO₂ Savings</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {[
                    { label: "This Month", value: "4.2 kg", icon: "📉", sub: "CO₂ saved" },
                    { label: "Cycle Rides", value: "4 rides", icon: "🚲", sub: "0g emissions" },
                    { label: "vs Driving", value: "78%", icon: "📊", sub: "footprint cut" },
                    { label: "Trees Impact", value: "~2.1 kg", icon: "🌳", sub: "annual offset" },
                  ].map((s, i) => (
                    <div key={i} style={{ background: "var(--mist)", borderRadius: 14, padding: 14 }}>
                      <div style={{ fontSize: 24, marginBottom: 6 }}>{s.icon}</div>
                      <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, fontWeight: 700, color: "var(--leaf)" }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{s.label} · {s.sub}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: "linear-gradient(135deg, #fff8e7, #fef3c7)", borderRadius: 18, padding: 20, border: "1px solid rgba(244,185,66,0.2)" }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#92400e", marginBottom: 8 }}>🎁 CO₂ Bonus Coupons</div>
                <div style={{ fontSize: 13, color: "#78350f", marginBottom: 16, lineHeight: 1.6 }}>
                  Save 50+ kg of CO₂ in a month and unlock exclusive gift hampers and bonus credit packs.
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  {["🎪 Gift Hamper", "💳 Credit Boost", "🏆 Eco Badge"].map((b, i) => (
                    <div key={i} style={{ flex: 1, background: "white", borderRadius: 10, padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 600, color: "#92400e", border: "1px solid rgba(244,185,66,0.3)" }}>{b}</div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {/* QR MODAL */}
        {showQR && (
          <div className="modal-overlay" onClick={() => setShowQR(false)}>
            <div className="modal-sheet" onClick={(e) => e.stopPropagation()}>
              <div className="modal-handle" />
              <div className="modal-title">Claim Your Credit 🟡</div>
              <div className="modal-sub">Scan the QR code on the cycle stand screen to lock your cycle and earn your Green Credit.</div>
              <div className="qr-box">
                <div className="qr-icon"><Icon name="qr_code_scanner" /></div>
                <div className="qr-text">Point your camera at the stand screen QR code</div>
                <div style={{ marginTop: 12, fontSize: 28 }}>▪▪▪<br />▪ ▪<br />▪▪▪</div>
              </div>
              <button className="modal-confirm" onClick={scanCycle}>
                ✅ Simulate Scan & Claim +1 Credit
              </button>
              <button className="modal-cancel" onClick={() => setShowQR(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* TOAST */}
        <div className={`toast ${showToast ? "show" : ""}`}>{toast}</div>

        {/* BOTTOM NAV */}
        <nav className="bottom-nav">
          {TABS.map((t) => (
            <button key={t.id} className={`b-tab ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>
              <div className="b-tab-icon"><Icon name={t.icon} /></div>
              <div className="b-tab-label">{t.label}</div>
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<UrbanOasis />);
  </script>
</body>
</html>
